<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key System</title>
    <style>
        :root {
            --primary: #3b82f6; /* Blue */
            --success: #10b981; /* Green */
            --error: #ef4444;
            --bg: #0f172a;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: var(--bg);
            color: white;
        }

        .container {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }

        .key-display {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
            font-family: monospace;
            font-size: 1.1rem;
            margin: 20px 0;
            word-break: break-all;
            color: #60a5fa;
        }

        .btn {
            cursor: pointer;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-weight: 600;
            transition: 0.2s;
            width: 100%;
            font-size: 1rem;
        }

        .btn-copy { background: var(--primary); color: white; }
        .btn-copy:hover { background: #2563eb; }

        /* Blocked Popup */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(10px);
        }

        .modal {
            background: white;
            color: #1e293b;
            padding: 30px;
            border-radius: 12px;
            max-width: 300px;
            text-align: center;
        }

        .modal h2 { color: var(--error); margin-top: 0; }
    </style>
</head>
<body>

    <div class="container" id="mainPage">
        <h1 style="margin-top:0">Your Key</h1>
        <p style="color: #94a3b8;">Copy the key below and paste it into the loader.</p>
        
        <div class="key-display" id="keyText">molten_api_Wh1q3wodl7</div>

        <button class="btn btn-copy" id="copyBtn" onclick="copyKey()">Copy Key</button>
    </div>

    <!-- Blocked Popup -->
    <div class="overlay" id="blockedOverlay">
        <div class="modal">
            <h2>Blocked</h2>
            <p>We have detected that you have tried to bypass our key system, please get the key again.</p>
            <button class="btn btn-copy" onclick="https://ogmarket.online/molten">Go back home</button>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const ANTIBYPASS = true; // Set to false to disable the check
        let FINAL_KEY = "molten_api_Wh1q3wodl7";
        // ---------------------

        window.onload = function() {
            const referrer = document.referrer.toLowerCase();
            const overlay = document.getElementById('blockedOverlay');
            const keyDisplay = document.getElementById('keyText');

            if (ANTIBYPASS) {
                // Checks if the user came from Linkvertise
                if (!referrer.includes("linkvertise.com")) {
                    // 1. Destroy the key so they can't see it in Inspect Element easily
                    FINAL_KEY = "fuck_you_nigger";
                    keyDisplay.innerText = "ACCESS_DENIED";
                    
                    // 2. Show the blocked popup
                    overlay.style.display = "flex";
                    
                    // 3. Hide the main content
                    document.getElementById('mainPage').style.display = "none";
                }
            }
        };

        function copyKey() {
            const btn = document.getElementById('copyBtn');
            
            navigator.clipboard.writeText(FINAL_KEY).then(() => {
                btn.innerText = "Copied!";
                btn.style.background = "var(--success)";
                
                setTimeout(() => {
                    btn.innerText = "Copy Key";
                    btn.style.background = "var(--primary)";
                }, 2000);
            });
        }
    </script>
</body>
</html>
