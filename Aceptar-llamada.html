<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PULSAME</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100dvh;
    font-family: sans-serif;
    overflow: hidden;
    user-select: none;
  }

  #landing {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  #pulse-btn {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #25d366, #075e54);
    border: none;
    color: white;
    font-weight: bold;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(37,211,102,.5); }
    70% { box-shadow: 0 0 0 30px rgba(37,211,102,0); }
    100% { box-shadow: 0 0 0 0 rgba(37,211,102,0); }
  }

  #no-touch-msg {
    display: none;
    color: red;
  }

  #call-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, #1a1a2e, #0f3460);
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 60px 0;
  }

  .contact-name {
    color: white;
    font-size: 2.2rem;
  }

  .contact-pic {
    width: 120px;
    height: 120px;
    border-radius: 50%;
  }

  #call-duration {
    display: none;
    color: white;
  }

  #btn-row {
    display: flex;
    justify-content: space-around;
    width: 100%;
  }

  .btn-hangup {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: red;
    border: none;
  }

  #accept-track {
    width: 72px;
    height: 140px;
    background: rgba(255,255,255,.1);
    border-radius: 36px;
    position: relative;
  }

  #accept-thumb {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: #25d366;
    position: absolute;
    bottom: 0;
  }

  #hung-up-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    color: white;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
</style>
</head>

<body>

<div id="landing">
  <button id="pulse-btn" onclick="handleTap()">PULSAME</button>
  <div id="no-touch-msg">NO PUEDES USARME AQUÍ</div>
</div>

<div id="call-screen">
  <div>
    <div class="contact-name">Hitler</div>
    <img class="contact-pic" src="https://i.imgflip.com/7c04fj.jpg">
    <div id="call-duration"></div>
  </div>

  <div id="btn-row">
    <button class="btn-hangup"></button>

    <div id="accept-track">
      <div id="accept-thumb"></div>
    </div>
  </div>
</div>

<div id="hung-up-overlay">
  <div>Llamada finalizada</div>
</div>

<audio id="ring-audio" loop></audio>

<script>
const audio = document.getElementById("ring-audio");

let vibrationInterval = null;
let callTimer = null;
let seconds = 0;

/* ---------- FULLSCREEN + SCREEN ---------- */
function handleTap() {
  const el = document.documentElement;
  el.requestFullscreen?.();
  showCallScreen();
}

function showCallScreen() {
  document.getElementById("landing").style.display = "none";
  document.getElementById("call-screen").style.display = "flex";

  startVibration(); // 📳 start ringing vibration
  setupSlider();
}

/* ---------- VIBRATION WHILE RINGING ---------- */
function startVibration() {
  if (!navigator.vibrate) return;

  // repeat vibration pattern every 2 seconds
  vibrationInterval = setInterval(() => {
    navigator.vibrate([500, 300, 500]);
  }, 1200);
}

function stopVibration() {
  if (vibrationInterval) clearInterval(vibrationInterval);
  navigator.vibrate?.(0);
}

/* ---------- AUDIO (ONLY ACTIVE CALL) ---------- */
function startAudio() {
  fetch("https://files.catbox.moe/7ei131.mp3")
    .then(r => r.blob())
    .then(blob => {
      audio.src = URL.createObjectURL(blob);
      audio.play().catch(() => {});
    });
}

function stopAudio() {
  audio.pause();
  audio.currentTime = 0;
}

/* ---------- ACCEPT CALL ---------- */
function acceptCall() {
  stopVibration();   // 📳 stop ringing vibration

  document.getElementById("accept-track").style.display = "none";

  document.getElementById("call-duration").style.display = "block";

  startAudio(); // 🔊 ONLY now audio starts (call active)

  callTimer = setInterval(() => {
    seconds++;
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    document.getElementById("call-duration").textContent =
      m + ":" + String(s).padStart(2, "0");
  }, 1000);

  setTimeout(endCall, 10000);
}

/* ---------- END CALL ---------- */
function endCall() {
  clearInterval(callTimer);
  stopAudio();     // 🔇 stop audio when call ends

  document.getElementById("hung-up-overlay").style.display = "flex";
}

/* ---------- SLIDER ---------- */
function setupSlider() {
  const thumb = document.getElementById("accept-thumb");
  const max = 68;
  let startY = null;
  let pos = 0;

  const y = e => e.touches ? e.touches[0].clientY : e.clientY;

  function start(e) { startY = y(e); }

  function move(e) {
    if (startY === null) return;
    pos = Math.max(0, Math.min(max, startY - y(e)));
    thumb.style.bottom = pos + "px";
  }

  function end() {
    if (pos > max * 0.7) acceptCall();
    else thumb.style.bottom = "0px";
    startY = null;
  }

  thumb.addEventListener("touchstart", start);
  thumb.addEventListener("touchmove", move);
  thumb.addEventListener("touchend", end);

  thumb.addEventListener("mousedown", start);
  window.addEventListener("mousemove", move);
  window.addEventListener("mouseup", end);
}
</script>

</body>
</html>
